<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="/styles.css">
</head>

<body style="height: 100vh;">
<header>
    <h1>title</h1>
    <nav>
        <a href="/index.html">Accueil</a>
        <a href="/help/">Help</a>
    </nav>
</header>
<section class="fx-center grow">
    <div class="fx-col jc-between container w-400 h-500">

        <h3>Welcome !</h3>
        
        <div class="fx-row jc-center">
            <form class="fx-col gap-40 w-300">
                <div class="fx-col gap-10">
                    <div class="fx-row">Email :</div>
                    <div class="fx-col">
                        <input id="email" type="email" required>
                    </div>
                </div>
                <div class="fx-col gap-10">
                    <div class="fx-row">
                        Password : </div>
                    <div class="fx-col">
                        <input id="password" type="password" required>
                    </div>
                </div>
                
                <div id="status"></div>
            </form>
        </div>


        <div class="fx-col gap-40 ai-center">
            <div class="fx-col gap-20 link">
                <a href="" class="link">create acount</a>
                <a href="">forget password</a>
            </div>
            <button id="login">login</button>
        </div>
    </div>
</section>
</body>

<script type="module" src="script.js"></script>
</html>
