version: "3.8"

services:
  # 1. Le serveur Web (Nginx)
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app-network

  # 2. L'interpréteur PHP (FPM)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_fpm
    volumes:
      - ./www:/var/www/html
    networks:
      - app-network

  # 3. La Base de données (MariaDB 11)
  db:
    image: mariadb:11
    container_name: mariadb_db
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge